<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade to Featured Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow border-0">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <h2>⭐ Upgrade to Featured Job</h2>
                        <p class="text-muted">
                            Increase visibility and attract more qualified candidates.
                        </p>
                    </div>

                    
                    <h5 class="mb-3">Choose a Featured Plan</h5>

                    <form method="post">
                        {% csrf_token %}
            {% for plan in plans %}
                        <div class="form-check border rounded p-3 mb-3">
                            <input style="border-color: #ffc107;background-color: #ffc107;" class="form-check-input"
                                   type="radio"
                                   name="plan_id"
                                   value="{{plan.id}}"
                                   >

                            <label class="form-check-label ms-2">
                                <strong>{{plan.name}}</strong><br>
                                Featured for {{plan.duration_days}} Days<br>
                                ₹{{plan.price}}
                            </label>
                        </div>
            {%endfor%}
                        <div class="d-grid">
                            <button type="submit"
                                    class="btn btn-warning btn-lg">
                                Proceed to Payment
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
