{% extends 'base.html' %}
{% load static %}
{% block title %} Companies {% endblock %}

{%  block css %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/companies.css' %}">
   {% endblock %}

{% block content %}
<!-- POPULAR COMPANIES -->

<section class="py-5">
    <div class="container">

        <h2 class="section-title">
            Popular companies
        </h2>

        <div class="row g-4">
        {% for com in companies %}
            <div class="col-lg-4 col-md-6">
                <div class="company-card">

                    <div class="d-flex align-items-center gap-3">

                        <img src="/media/{{com.logo}}"
                             class="company-logo">

                        <div>
                            <div class="company-name">{{com.company_name}}</div>
                        </div>
                    </div>
                    <div class="company-links">
                        <a href="#">Open jobs</a>
                    </div>

                </div>
            </div>
        {% endfor %}
            <!-- Company 6 -->

          

        </div>

    </div>
</section>


 {% endblock %}
