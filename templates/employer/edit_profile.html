{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/jobapply.css' %}">
    <style>
body{
    background:#f5f7fb;
}

.card{
    border:none;
    border-radius:15px;
}

.form-control,
.form-select{
    border-radius:10px;
}

.logo-preview{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:50%;
    border:2px solid #ddd;
}
</style>

</head>
<body>
<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header">
            <h3>Edit Company Profile</h3>
        </div>

        <div class="card-body">

             <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="row">

        <div class="col-md-6 mb-3">
            <label>Company Name</label>
            <input type="text"
                   name="company_name"
                   class="form-control"
                   value="{{ company.company_name }}"
                   required>
        </div>

        <div class="col-md-6 mb-3">
            <label>Logo</label>
            {% if company.logo %}
                <img src="{{ company.logo.url }}"
                     width="120"
                     class="mb-3">
            {% endif %}

            
            <input type="file"
                   name="logo"
                   class="form-control">
        </div>

       <div class="col-md-6 mb-3">
    <label class="form-label">Industry</label>

    <select name="industry" class="form-select" required>
        <option value="">Select Industry</option>

        {% for industry in industries %}
            <option value="{{ industry.id }}"
                {% if company.industry.id == industry.id %}
                    selected
                {% endif %}>
                {{ industry.name }}
            </option>
        {% endfor %}
    </select>
</div>

        <div class="col-md-6 mb-3">
            <label>Email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   value="{{ company.email }}">
        </div>

        <div class="col-md-6 mb-3">
            <label>Phone</label>
            <input type="text"
                   name="phone"
                   class="form-control"
                   value="{{ company.phone }}">
        </div>

        <div class="col-md-6 mb-3">
            <label>Website</label>
            <input type="url"
                   name="website"
                   class="form-control"
                   value="{{ company.website }}">
        </div>

        <div class="col-md-6 mb-3">
            <label>LinkedIn</label>
            <input type="url"
                   name="linkedin_url"
                   class="form-control"
                   value="{{ company.linkedin_url }}">
        </div>

        <div class="col-md-6 mb-3">
            <label>Facebook</label>
            <input type="url"
                   name="facebook_url"
                   class="form-control"
                   value="{{ company.facebook_url }}">
        </div>

        <div class="col-md-4 mb-3">
            <label>City</label>
            <input type="text"
                   name="city"
                   class="form-control"
                   value="{{ company.city }}">
        </div>

        <div class="col-md-4 mb-3">
            <label>State</label>
            <input type="text"
                   name="state"
                   class="form-control"
                   value="{{ company.state }}">
        </div>

        <div class="col-md-4 mb-3">
            <label>Country</label>
            <input type="text"
                   name="country"
                   class="form-control"
                   value="{{ company.country }}">
        </div>

        <div class="col-md-6 mb-3">
            <label>Company Size</label>
            <select name="company_size" class="form-select">
                {% for value,label in company.COMPANY_SIZE_CHOICES %}
                    <option value="{{ value }}"
                        {% if company.company_size == value %}selected{% endif %}>
                        {{ label }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-6 mb-3">
            <label>Founded Year</label>
            <input type="number"
                   name="founded_year"
                   class="form-control"
                   value="{{ company.founded_year }}">
        </div>

        <div class="col-12 mb-3">
            <label>Address</label>
            <textarea name="address"
                      class="form-control"
                      rows="3">{{ company.address }}</textarea>
        </div>

        <div class="col-12 mb-3">
            <label>Description</label>
            <textarea name="description"
                      class="form-control"
                      rows="4">{{ company.description }}</textarea>
        </div>

    </div>

    <button type="submit" class="btn btn-primary">
        Update Profile
    </button>
</form>
        </div>
    </div>

</div>
</body>
</html>
