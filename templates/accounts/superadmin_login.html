<!DOCTYPE html>
<html>
<head>
    <title>Super Admin Login</title>
</head>
<body style="font-family: Arial; background:#f2f2f2;">

<div style="width:350px; margin:100px auto; padding:20px; background:white; border-radius:10px;">

    <h2 style="text-align:center;">Super Admin Login</h2>

    {% if messages %}
        {% for message in messages %}
            <p style="color:red; text-align:center;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username"
               style="width:100%; padding:10px; margin:10px 0;">

        <input type="password" name="password" placeholder="Password"
               style="width:100%; padding:10px; margin:10px 0;">

        <button type="submit"
                style="width:100%; padding:10px; background:black; color:white;">
            Login
        </button>
    </form>

</div>

</body>
</html>
