{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/jobapply.css' %}">
    <style>
body{
    background:#f5f7fb;
}

.card{
    border:none;
    border-radius:15px;
}

.form-control,
.form-select{
    border-radius:10px;
}

.logo-preview{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:50%;
    border:2px solid #ddd;
}
</style>

</head>
<body>
<div class="container py-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>Edit Profile</h3>
        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Phone</label>
                        <input type="text"
                               name="phone"
                               class="form-control"
                               value="{{ jobseeker.phone }}">
                    </div>

                    <div class="col-md-6 mb-3">
    <label>Date of Birth</label>
    <input type="date"
           name="date_of_birth"
           class="form-control"
           value="{{ jobseeker.date_of_birth|date:'Y-m-d' }}">
</div>

                    <div class="col-md-6 mb-3">
                        <label>Gender</label>
                        <select name="gender" class="form-select">
                            <option value="Male" {% if jobseeker.gender == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if jobseeker.gender == 'Female' %}selected{% endif %}>Female</option>
                            <option value="Other" {% if jobseeker.gender == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Qualification</label>
                        <input type="text"
                               name="qualification"
                               class="form-control"
                               value="{{ jobseeker.qualification }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Experience</label>
                        <input type="text"
                               name="experience"
                               class="form-control"
                               value="{{ jobseeker.experience }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Category</label>
                        <select name="category" id="category" class="form-select">
                            {% for category in categories %}
                            <option value="{{ category.id }}"
                                {% if jobseeker.category_id == category.id %}selected{% endif %}>
                                {{ category.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-12 mb-3" id="skills-container">
                        <label>Skills</label>
                        {% for skill in skills %}
                        <input type="checkbox" {% if skill in jobseeker.skills.all %}checked{% endif %} name="skills" value="{{ skill.id }}" ><label>{{ skill.name }}</label>
                        {% endfor %}
                        
                        <small class="text-muted">
                            Hold Ctrl to select multiple skills
                        </small>
                    </div>
                 
                    <div class="col-12 mb-3">
                        <label>Address</label>
                        <textarea name="address"
                                  class="form-control"
                                  rows="3">{{ jobseeker.address }}</textarea>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>City</label>
                        <input type="text"
                               name="city"
                               class="form-control"
                               value="{{ jobseeker.city }}">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>State</label>
                        <input type="text"
                               name="state"
                               class="form-control"
                               value="{{ jobseeker.state }}">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Country</label>
                        <input type="text"
                               name="country"
                               class="form-control"
                               value="{{ jobseeker.country }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>LinkedIn</label>
                        <input type="url"
                               name="linkedin"
                               class="form-control"
                               value="{{ jobseeker.linkedin }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>GitHub</label>
                        <input type="url"
                               name="github"
                               class="form-control"
                               value="{{ jobseeker.github }}">
                    </div>

                    <div class="col-12 mb-3">
                        <label>Resume</label>
                        <input type="file"
                               name="resume"
                               class="form-control">

                        {% if jobseeker.resume %}
                        <small class="text-success">
                            Current Resume:
                            <a href="{{ jobseeker.resume.url }}" target="_blank">
                                View Resume
                            </a>
                        </small>
                        {% endif %}
                    </div>

                    <div class="col-12 mb-3">
                        <label>Career Objective</label>
                        <textarea name="objective"
                                  class="form-control"
                                  rows="4">{{ jobseeker.objective }}</textarea>
                    </div>

                </div>

                <div class="text-end">
                    <a href="{% url 'jobseeker_profile' %}"
                       class="btn btn-secondary">
                        Cancel
                    </a>

                    <button type="submit"
                            class="btn btn-primary">
                        Update Profile
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
$(document).ready(function(){

    $('#category').change(function(){

        var category_id = $(this).val();

        $.ajax({
            url: '/jobs/get-skills/',
            type: 'GET',
            data: {
                category_id: category_id
            },
            success: function(response){

                $('#skills-container').html('<p>select skills for job<p>');

                $.each(response.skills, function(index, skill){

                    $('#skills-container').append(`
                        <div>
                            <input type="checkbox"
                                   name="skills"
                                   value="${skill.id}"
                                   id="skill_${skill.id}">
                            <label for="skill_${skill.id}">
                                ${skill.name}
                            </label>
                        </div>
                    `);

                });

            }
        });

    });

});
</script>
